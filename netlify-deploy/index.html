.text-purple { color: var(--purple); }
.text-muted { color: var(--text2); }
.text-faint { color: var(--text3); }

/* ---- RESPONSIVE ---- */
@media (max-width: 700px) {
  .sidebar { width: 0; min-width: 0; position: fixed; left: 0; top: 0; bottom: 0; z-index: 20; transition: width .2s; }
  .sidebar.open { width: 224px; min-width: 224px; box-shadow: 4px 0 20px rgba(0,0,0,.15); }

::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,.25); }

/* ---- LOGIN SCREEN ---- */
.login-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 1rem;
}
.login-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 14px;
  padding: 2.5rem;
  width: 380px;
  max-width: 100%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  text-align: center;
}
.login-logo {
  width: 180px;
  margin: 0 auto 1.5rem;

  align-items: center;
  justify-content: center;
}
.login-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 2rem; }
.login-btn {
  width: 100%;
  padding: 11px;
  border-radius: 8px;
  border: none;
  background: var(--blue);
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background .1s;
  margin-bottom: .75rem;
}
.login-btn:hover { background: #0C447C; }
.login-footer { font-size: 11px; color: var(--text3); margin-top: 1.5rem; }

function stdPct(std) {
  const k = Object.keys(std);
  return Math.round(k.filter(x => std[x]).length / k.length * 100);
}
function prioCls(p) {
  return {Omgående:'badge-red','Inom en vecka':'badge-amber','Inom en månad':'badge-blue','Vid lucka':'badge-gray'}[p] || 'badge-purple';
}
function sBadge(s) {
  const m = {Aktiv:'badge-green',Uppsagd:'badge-red',Vakant:'badge-amber',Oklar:'badge-gray',Tillägg:'badge-purple'};
  return `<span class="badge ${m[s]||'badge-gray'}">${s}</span>`;
}
function fmtKr(n) { return n ? n.toLocaleString('sv') + ' kr' : '–'; }
function fmtMkr(n) { return Math.round(n/100000)/10 + ' Mkr'; }
function isOH() { return cF === 'oresund'; }
function btnClass() { return isOH() ? 'btn-oh' : 'btn-b'; }
function acClass() { return isOH() ? 'active-oh' : 'active-b'; }
function tabAcClass() { return isOH() ? 'active-oh' : 'active'; }

function daysBetween(dateStr) {
  if (!dateStr || dateStr === '–' || dateStr === 'Uppsagt') return null;
  return Math.round((new Date(dateStr) - new Date()) / 86400000);
}
function dagBadge(d) {
  if (d === null) return '';
  if (d < 0) return `<span class="badge badge-red">Passerat</span>`;
  if (d < 90) return `<span class="badge badge-red">${d}d</span>`;
  if (d < 270) return `<span class="badge badge-amber">${d}d</span>`;
  return `<span class="badge badge-green">${d}d</span>`;
}

function renderSidebar() {
  const role = currentRole || 'forvaltare';

  // Hyresgäst – completely different sidebar
  if (role === 'hyresgast') {
    const lgh = currentUser?.user_metadata?.lgh || '';
    const lghInfo = BOSTADER.find(b => b.lgh === lgh);
    let h = `<div class="sb-switcher">
      <span class="sw-label">Min lägenhet</span>
      <div class="sw-btn active-b" style="cursor:default;">
        <div class="sw-icon" style="background:#E6F1FB;color:#185FA5;">🏠</div>
        <div class="sw-info">
          <div class="sw-name">Lgh ${lgh || '–'}</div>
          <div class="sw-addr">${lghInfo ? lghInfo.namn : 'Bjäre 6'}</div>
        </div>
      </div>
    </div>
    <div class="nav-section"><span class="nav-label">Min sida</span>
      ${NAV_HG.map(n=>`<button class="nav-item${cV===n.id?' active-b':''}" onclick="goto('${n.id}')">${n.lbl}</button>`).join('')}
    </div>`;
    document.getElementById('sidebar').innerHTML = h;
    return;
  }

  // Admin/förvaltare – choose correct nav based on role
  const navB = role === 'admin' ? NAV_B : NAV_B_FORV;
  const navOH = role === 'admin' ? NAV_OH : NAV_OH_FORV;
  const nav = cF === 'portfolio' ? [{id:'portfolio',lbl:'Portföljöversikt',sec:'Portfölj'}] : cF === 'bjare6' ? navB : navOH;
  const secs = {};
  nav.forEach(n => { if (!secs[n.sec]) secs[n.sec] = []; secs[n.sec].push(n); });

  let h = `<div class="sb-switcher"><span class="sw-label">Fastighet</span>`;
  h += `<button class="sw-btn${cF==='portfolio'?' active-all':''}" onclick="sw('portfolio')">
    <div class="sw-icon" style="background:#F1EFE8;color:#5F5E5A;">ALL</div>
    <div class="sw-info"><div class="sw-name">Portföljöversikt</div><div class="sw-addr">Alla fastigheter</div></div>
  </button>`;
  h += `<button class="sw-btn${cF==='bjare6'?' active-b':''}" onclick="sw('bjare6')">
    <div class="sw-icon" style="background:#E6F1FB;color:#185FA5;">B6</div>
    <div class="sw-info"><div class="sw-name">Fastighets AB Bjäre 6</div><div class="sw-addr">Östra Stallmästaregatan 12</div></div>
  </button>`;
  h += `<button class="sw-btn${cF==='oresund'?' active-oh':''}" onclick="sw('oresund')">
    <div class="sw-icon" style="background:#EEEDFE;color:#534AB7;">ÖH</div>
    <div class="sw-info"><div class="sw-name">Öresundshuset AB</div><div class="sw-addr">Hans Michelsensgatan 9</div></div>
  </button></div>`;

  Object.entries(secs).forEach(([sec, items]) => {
    h += `<div class="nav-section"><span class="nav-label">${sec}</span>`;
    items.forEach(n => {
      const dot = n.dot === 'red' ? `<span class="nav-dot" style="background:#A32D2D;"></span>` :
                  n.dot === 'amber' ? `<span class="nav-dot" style="background:#BA7517;"></span>` : '';
      h += `<button class="nav-item${cV===n.id?' '+acClass():''}" onclick="goto('${n.id}')">${n.lbl}${dot}</button>`;
    });
    h += `</div>`;
  });
  document.getElementById('sidebar').innerHTML = h;
}

  const BL = {atgardslista:'+ Åtgärd','oh-atgardslista':'+ Åtgärd',felanmalan:'+ Felanmälan','oh-felanmalan':'+ Felanmälan','oh-vakans':'+ Vakant yta',besiktning:'+ Ny besiktning'};

    'hg-hem':rHgHem, 'hg-felanmalan':rHgFelan, 'hg-gemensamt':rHgGemensamt,
  };
  if (fn[v]) fn[v]();
}

function atgItem(a, src) {
  const isB = src === 'B';
  const startFn = isB ? `startAtg(${a.id},'B')` : `startAtg(${a.id},'OH')`;
  const klarFn = isB ? `klarAtg(${a.id},'B')` : `klarAtg(${a.id},'OH')`;
  const delFn = isB ? `delAtg(${a.id},'B')` : `delAtg(${a.id},'OH')`;
  return `<div class="atg-item">
    <div style="display:flex;justify-content:space-between;gap:8px;">
      <div><div class="fw-500" style="font-size:12px;">${a.titel}</div><div class="text-faint fs-10">${a.plats} · ${a.ansvarig}</div></div>
      <span class="badge ${prioCls(a.prio)}">${a.prio}</span>
    </div>
    ${a.kostnad ? `<div class="text-faint fs-11" style="margin-top:4px;">~${parseInt(a.kostnad).toLocaleString('sv')} kr</div>` : ''}
    <div style="display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;">
      ${a.status==='Ej påbörjat'?`<button class="btn btn-sm" onclick="${startFn}">Starta</button>`:''}
      ${a.status==='Pågående'?`<button class="btn btn-sm ${isB?'btn-b':'btn-oh'}" onclick="${klarFn}">Klar → historik</button>`:''}
      <button class="btn btn-sm btn-danger" onclick="${delFn}">Ta bort</button>
    </div>
  </div>`;
}

function noneMsg() { return '<div class="text-faint" style="font-size:12px;padding:.5rem;">Inga</div>'; }
function startAtg(id, src) { const arr = src==='B'?ATG_B:ATG_OH; const a = arr.find(x=>x.id===id); if(a){a.status='Pågående';src==='B'?rBAtg():rOHAtg();notify('Status: Pågående');} }
function klarAtg(id, src) {
  const arr = src==='B'?ATG_B:ATG_OH; const hist = src==='B'?HIST_B:HIST_OH;

  document.querySelectorAll('.bstep').forEach((el,i) => {

}

function addFoto(key,label) {
  if (!BS.bilder[key]) BS.bilder[key]=[];
  const colors=['#B5D4F4','#C0DD97','#FAC775','#F5C4B3'];
  const c=colors[Math.floor(Math.random()*colors.length)];
  const cv=document.createElement('canvas'); cv.width=200; cv.height=150;
  const ctx=cv.getContext('2d'); ctx.fillStyle=c; ctx.fillRect(0,0,200,150);
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(0,110,200,40);
  ctx.fillStyle='#fff'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center'; ctx.fillText(label,100,128);
  ctx.font='10px sans-serif'; ctx.fillStyle='rgba(255,255,255,.6)'; ctx.fillText(new Date().toLocaleTimeString('sv'),100,142);
  ctx.fillStyle='rgba(255,255,255,.18)'; ctx.beginPath(); ctx.arc(100,65,28,0,Math.PI*2); ctx.fill();
  ctx.font='26px sans-serif'; ctx.fillStyle='rgba(255,255,255,.8)'; ctx.fillText('📷',100,74);
  BS.bilder[key].push({data:cv.toDataURL(),note:''});
  renderBStep();
}

function toggleLghField() {
  const role = document.getElementById('inv-role').value;
  document.getElementById('inv-lgh-row').classList.toggle('hidden', role !== 'hyresgast');
  const previews = {
    forvaltare: '<strong>Teknisk förvaltare</strong> ser: Dashboard, lägenheter, åtgärder, felanmälningar, besiktning. Ser ej ekonomi.',
    hyresgast: '<strong>Hyresgäst</strong> ser: Sin egen lägenhet, felanmälan (egen lgh), felanmälan gemensamma utrymmen. Ser ej ekonomi eller andras uppgifter.',
    admin: '<strong>Admin</strong> ser: Allt, inklusive ekonomi, kontrakt, massutskick och användarhantering.'
  };
  const el = document.getElementById('inv-preview');
  if (el) el.innerHTML = previews[role] || '';
}

async function bjudIn() {
  const email = document.getElementById('inv-email').value.trim();
  const role = document.getElementById('inv-role').value;
  const lgh = role === 'hyresgast' ? document.getElementById('inv-lgh').value : '';
  const statusEl = document.getElementById('inv-status');
  const btn = document.querySelector('#inv-status').previousElementSibling;

  if (!email || !email.includes('@')) { notify('Ange en giltig e-postadress'); return; }

  statusEl.innerHTML = `<div class="text-muted fs-11" style="padding:.5rem 0;">Skickar inbjudan...</div>`;
  if (btn) btn.disabled = true;

  try {
    const res = await fetch('/.netlify/functions/invite-user', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`
      },
      body: JSON.stringify({ email, role, lgh })
    });

    const data = await res.json();

    if (!res.ok) {
      statusEl.innerHTML = `<div style="background:var(--red-bg);border:0.5px solid #F7C1C1;border-radius:7px;padding:10px 14px;font-size:12px;color:var(--red);">✗ ${data.error || 'Något gick fel.'}</div>`;
      return;
    }

    const roleLabels = {admin:'Admin', forvaltare:'Teknisk förvaltare', hyresgast:'Hyresgäst'};
    statusEl.innerHTML = `<div style="background:var(--green-bg);border:0.5px solid #C0DD97;border-radius:7px;padding:10px 14px;">
      <div style="font-weight:500;color:var(--green);margin-bottom:3px;">✓ Inbjudan skickad</div>
      <div style="font-size:12px;color:var(--green);">
        <strong>${email}</strong> har bjudits in som <strong>${roleLabels[role]}</strong>.
        ${lgh ? `Kopplad till lägenhet <strong>${lgh}</strong>.` : ''}
        <br>De får en inbjudningslänk via e-post och väljer sitt eget lösenord.
      </div>
    </div>`;
    document.getElementById('inv-email').value = '';

  } catch(e) {
    statusEl.innerHTML = `<div style="background:var(--red-bg);border:0.5px solid #F7C1C1;border-radius:7px;padding:10px 14px;font-size:12px;color:var(--red);">✗ Kunde inte ansluta. Kontrollera din anslutning.</div>`;
  } finally {
    if (btn) btn.disabled = false;
  }
}

/* ============================================================
   ÄRENDEHANTERING – 1A
   ============================================================ */

let arendenFilter = {fastighet:'', status:'', ansvarig:''};

function rArenden(fastighet) {
  const roll = currentRole || 'admin';
  const egnaOnly = roll === 'forvaltare';
  const egnaEmail = currentUser?.email || '';

  // Filter ärenden
  let list = ARENDEN.filter(a => a.fastighet === fastighet);
  if (egnaOnly) list = list.filter(a => a.ansvarig === 'Mustafa Ibrahimovic' || a.ansvarig.toLowerCase().includes(egnaEmail.split('@')[0].toLowerCase()));
  if (arendenFilter.status) list = list.filter(a => a.status === arendenFilter.status);

  const nyCount = list.filter(a => a.status === 'Ny').length;
  const pagCount = list.filter(a => a.status === 'Pågående').length;
  const vantarCount = list.filter(a => a.status === 'Väntar').length;
  const atgCount = list.filter(a => a.status === 'Åtgärdad').length;

  const statBtns = ARENDE_STATUSAR.concat(['Alla']).map(s => {
    const active = (arendenFilter.status === s) || (s === 'Alla' && !arendenFilter.status);
    return `<button class="area-tab${active?' active':''}" onclick="filterArenden('${s === 'Alla' ? '' : s}','${fastighet}')">${s}</button>`;
  }).join('');

  const kanSkapa = roll === 'admin';

  document.getElementById('content').innerHTML = `
  <div style="display:flex;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap;">
    <div class="card" style="flex:1;min-width:100px;padding:.875rem 1rem;margin-bottom:0;">
      <div style="font-size:10px;font-weight:500;color:var(--text2);margin-bottom:2px;">NYA</div>
      <div style="font-size:22px;font-weight:600;color:var(--red);">${nyCount}</div>
    </div>
    <div class="card" style="flex:1;min-width:100px;padding:.875rem 1rem;margin-bottom:0;">
      <div style="font-size:10px;font-weight:500;color:var(--text2);margin-bottom:2px;">PÅGÅENDE</div>
      <div style="font-size:22px;font-weight:600;color:var(--amber);">${pagCount}</div>
    </div>
    <div class="card" style="flex:1;min-width:100px;padding:.875rem 1rem;margin-bottom:0;">
      <div style="font-size:10px;font-weight:500;color:var(--text2);margin-bottom:2px;">VÄNTAR</div>
      <div style="font-size:22px;font-weight:600;color:var(--blue);">${vantarCount}</div>
    </div>
    <div class="card" style="flex:1;min-width:100px;padding:.875rem 1rem;margin-bottom:0;">
      <div style="font-size:10px;font-weight:500;color:var(--text2);margin-bottom:2px;">ÅTGÄRDADE</div>
      <div style="font-size:22px;font-weight:600;color:var(--green);">${atgCount}</div>
    </div>
  </div>

  <div class="area-tabs" style="margin-bottom:1rem;">${statBtns}</div>

  ${kanSkapa ? `<div style="margin-bottom:1rem;"><button class="btn ${fastighet==='bjare6'?'btn-b':'btn-oh'}" onclick="showNyttArendeModal('${fastighet}')">+ Nytt ärende</button></div>` : ''}

  <div id="arenden-list">
    ${list.length === 0 ? `<div class="info-box info-blue">Inga ärenden matchar filtret.</div>` :
      list.map(a => arendeKort(a, roll)).join('')}
  </div>`;
}

function filterArenden(status, fastighet) {
  arendenFilter.status = status;
  rArenden(fastighet);
}

function arendeKort(a, roll) {
  const statusCls = ARENDE_STATUS_CLS[a.status] || 'badge-gray';
  const kanAndraStatus = roll === 'admin' || roll === 'forvaltare';
  const kanStanga = roll === 'admin';

  const nastaStatus = {
    'Ny': 'Pågående',
    'Pågående': 'Väntar',
    'Väntar': 'Åtgärdad',
    'Åtgärdad': 'Stängd'
  };
  const statusKnapp = a.status !== 'Stängd' && kanAndraStatus ? `
    <button class="btn btn-sm ${a.fastighet==='bjare6'?'btn-b':'btn-oh'}" onclick="uppdateraArendeStatus('${a.id}','${nastaStatus[a.status]}')">
      → ${nastaStatus[a.status]}
    </button>` : '';

  const aterstallKnapp = a.status === 'Stängd' && kanStanga ?
    `<button class="btn btn-sm" onclick="uppdateraArendeStatus('${a.id}','Ny')">Återöppna</button>` : '';

  const detaljKnapp = `<button class="btn btn-sm" onclick="visaArendeDetalj('${a.id}')">Visa →</button>`;

  return `<div class="atg-item" style="margin-bottom:.625rem;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;">
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:500;">${a.titel}</div>
        <div class="text-faint fs-10" style="margin-top:2px;">${a.enhet} · ${a.kat} · Skapad ${a.skapad}</div>
      </div>
      <span class="badge ${statusCls}">${a.status}</span>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">${a.beskrivning.length > 80 ? a.beskrivning.substring(0,80)+'...' : a.beskrivning}</div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
      <div style="font-size:11px;color:var(--text2);">👤 ${a.ansvarig} · <span class="badge ${a.prio==='Hög'?'badge-red':a.prio==='Normal'?'badge-amber':'badge-gray'}">${a.prio}</span></div>
      <div style="display:flex;gap:5px;">${statusKnapp}${aterstallKnapp}${detaljKnapp}</div>
    </div>
  </div>`;
}

function uppdateraArendeStatus(id, nyStatus) {
  const a = ARENDEN.find(x => x.id === id);
  if (!a) return;
  const gammalStatus = a.status;
  a.status = nyStatus;
  a.uppdaterad = new Date().toISOString().split('T')[0];
  a.logg = a.logg || [];
  a.logg.push({
    datum: new Date().toISOString().split('T')[0],
    av: currentUser?.email || 'Admin',
    text: `Status ändrad: ${gammalStatus} → ${nyStatus}`
  });
  saveArenden();
  const fastighet = a.fastighet;
  rArenden(fastighet);
  notify(`✓ Status: ${nyStatus}`);
}

function visaArendeDetalj(id) {
  const a = ARENDEN.find(x => x.id === id);
  if (!a) return;
  const roll = currentRole || 'admin';
  const kanAndraStatus = roll === 'admin' || roll === 'forvaltare';
  const statusCls = ARENDE_STATUS_CLS[a.status] || 'badge-gray';

  const nastaStatus = {'Ny':'Pågående','Pågående':'Väntar','Väntar':'Åtgärdad','Åtgärdad':'Stängd'};
  const statusBtn = a.status !== 'Stängd' && kanAndraStatus ?
    `<button class="btn ${a.fastighet==='bjare6'?'btn-b':'btn-oh'}" onclick="uppdateraArendeStatus('${a.id}','${nastaStatus[a.status]}');closeModal()">Flytta till: ${nastaStatus[a.status]}</button>` : '';

  const loggHtml = (a.logg || []).slice().reverse().map(l =>
    `<div style="padding:8px 0;border-bottom:0.5px solid var(--border);">
      <div style="font-size:11px;color:var(--text2);">${l.datum} · ${l.av}</div>
      <div style="font-size:12px;margin-top:2px;">${l.text}</div>
    </div>`).join('');

  showModal(`
    <div class="modal-title">Ärende – ${a.titel}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;">
      <span class="badge ${statusCls}">${a.status}</span>
      <span class="badge ${a.prio==='Hög'?'badge-red':'badge-amber'}">${a.prio}</span>
      <span class="badge badge-blue">${a.kat}</span>
    </div>
    <div class="field-row"><span class="field-label">Enhet</span><span class="field-value">${a.enhet}</span></div>
    <div class="field-row"><span class="field-label">Ansvarig</span><span class="field-value">${a.ansvarig}</span></div>
    <div class="field-row"><span class="field-label">Skapad av</span><span class="field-value">${a.skapadAv}</span></div>
    <div class="field-row"><span class="field-label">Skapad</span><span class="field-value">${a.skapad}</span></div>
    <div class="field-row"><span class="field-label">Uppdaterad</span><span class="field-value">${a.uppdaterad}</span></div>
    <div style="margin:1rem 0;">
      <div class="form-label" style="margin-bottom:4px;">Beskrivning</div>
      <div style="font-size:12px;color:var(--text2);background:var(--bg);border-radius:6px;padding:.75rem;">${a.beskrivning}</div>
    </div>
    ${a.bilder && a.bilder.length ? `
    <div style="margin-bottom:1rem;">

}

/* ============================================================
   BILDUPPLADDNING – 2A
   ============================================================ */

window._uploadedImages = {}; // { contextKey: [base64, ...] }

function hanteraBildUppladdning(ctx) {
  const input = document.getElementById(ctx + '-bild-input');
  const preview = document.getElementById(ctx + '-bilder-preview');
  if (!input || !preview) return;
  const files = Array.from(input.files).slice(0, 3);
  window._uploadedImages[ctx] = window._uploadedImages[ctx] || [];

  files.forEach(file => {
    if (window._uploadedImages[ctx].length >= 3) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      // Komprimera via Canvas
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const maxW = 800;
        const scale = Math.min(1, maxW / img.width);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        const compressed = canvas.toDataURL('image/jpeg', 0.7);
        window._uploadedImages[ctx].push(compressed);
        renderBildPreview(ctx);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderBildPreview(ctx) {
  const preview = document.getElementById(ctx + '-bilder-preview');
  if (!preview) return;
  const imgs = window._uploadedImages[ctx] || [];
  preview.innerHTML = imgs.map((src, i) => `
    <div style="position:relative;display:inline-block;">
      <img src="${src}" style="width:72px;height:72px;object-fit:cover;border-radius:6px;border:0.5px solid var(--border);"/>
      <button onclick="taBortBild('${ctx}',${i})" style="position:absolute;top:-6px;right:-6px;background:#A32D2D;color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;">✕</button>
    </div>`).join('');
}

function taBortBild(ctx, idx) {
  if (window._uploadedImages[ctx]) {
    window._uploadedImages[ctx].splice(idx, 1);
    renderBildPreview(ctx);
  }
}

/* ============================================================
   AUTH & INIT – Direct API (no popup widget)
   ============================================================ */

const IDENTITY_URL = 'https://app.oresundshuset.se/.netlify/identity';
var currentUser = null;
var authToken = null;
var inviteToken = null;
var recoveryToken = null;

// Parse URL hash for tokens from Netlify invite/recovery emails
function parseUrlTokens() {
  const hash = window.location.hash;
  if (!hash) return;
  const params = {};
  hash.replace('#', '').split('&').forEach(function(p) {
    const parts = p.split('=');
    params[parts[0]] = decodeURIComponent(parts[1] || '');
  });

  if (params.invite_token) {
    inviteToken = params.invite_token;
    showSetPasswordForm('Välkommen!', 'Välj ett lösenord för ditt konto');
  } else if (params.recovery_token) {
    recoveryToken = params.recovery_token;
    showSetPasswordForm('Återställ lösenord', 'Ange ett nytt lösenord');
  }
  // Clean URL
  history.replaceState(null, '', window.location.pathname);
}

function showSetPasswordForm(title, sub) {
  document.getElementById('login-form-card').style.display = 'none';
  document.getElementById('set-password-card').style.display = 'block';
  document.getElementById('set-pw-title').textContent = title;
  document.getElementById('set-pw-sub').textContent = sub;
  setTimeout(function() { document.getElementById('new-password').focus(); }, 100);
}

async function submitSetPassword() {
  const pw1 = document.getElementById('new-password').value;
  const pw2 = document.getElementById('new-password2').value;
  const errEl = document.getElementById('set-pw-error');
  const ldEl = document.getElementById('set-pw-loading');
  const btn = document.getElementById('set-pw-btn');

  errEl.style.display = 'none';
  if (pw1.length < 8) { errEl.textContent = 'Lösenordet måste vara minst 8 tecken.'; errEl.style.display = 'block'; return; }
  if (pw1 !== pw2) { errEl.textContent = 'Lösenorden matchar inte.'; errEl.style.display = 'block'; return; }

  ldEl.style.display = 'block';
  btn.disabled = true;

  try {
    const token = inviteToken || recoveryToken;
    const endpoint = inviteToken ? '/verify' : '/recover';
    const type = inviteToken ? 'signup' : 'recovery';

    // Exchange token for access token
    const verifyRes = await fetch(IDENTITY_URL + endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token: token, type: type, password: pw1})
    });

    if (!verifyRes.ok) {
      const err = await verifyRes.json().catch(() => ({}));
      throw new Error(err.msg || err.error_description || 'Kunde inte spara lösenordet.');
    }

    const data = await verifyRes.json();
    const accessToken = data.access_token;

    // Get user info
    const userRes = await fetch(IDENTITY_URL + '/user', {
      headers: {'Authorization': 'Bearer ' + accessToken}
    });
    const user = await userRes.json();
    loginSuccess(user, accessToken);

  } catch(e) {
    errEl.textContent = e.message || 'Ett fel uppstod. Försök igen.';
    errEl.style.display = 'block';
    ldEl.style.display = 'none';
    btn.disabled = false;
  }
}

function getUserRole(user) {
  if (!user) return 'none';
  const roles = (user.app_metadata && user.app_metadata.roles) || [];
  if (roles.includes('admin')) return 'admin';
  if (roles.includes('forvaltare')) return 'forvaltare';
  if (roles.includes('hyresgast')) return 'hyresgast';
  return 'none'; // No role = no access until admin assigns one
}

function loginSuccess(user, token) {
  currentUser = user;
  authToken = token;
  if (token) {
    localStorage.setItem('fp_token', token);
    localStorage.setItem('fp_user', JSON.stringify(user));
  }

  const role = getUserRole(user);
  currentRole = role;

  // Block users with no role
  if (role === 'none') {
    document.getElementById('login-screen').style.display = 'none';
    document.querySelector('.app').style.display = 'flex';
    document.getElementById('content').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:60vh;">
        <div style="text-align:center;max-width:360px;">
          <div style="font-size:40px;margin-bottom:1rem;">🔒</div>
          <div style="font-size:16px;font-weight:500;margin-bottom:.5rem;">Inväntar behörighet</div>
          <div class="text-muted" style="font-size:13px;margin-bottom:1.5rem;">Ditt konto är skapat men en roll har inte tilldelats ännu. Kontakta info@oresundshuset.se.</div>
          <button class="btn" onclick="logout()">Logga ut</button>
        </div>
      </div>`;
    document.getElementById('sidebar').innerHTML = '';
    return;
  }

  const roleLabels = {admin:'👤 Admin', forvaltare:'🔧 Teknisk förv.', hyresgast:'🏠 Hyresgäst'};
  const rolePill = document.getElementById('role-pill-btn');
  if (rolePill) rolePill.textContent = roleLabels[role] || '🔧';

  document.getElementById('login-screen').style.display = 'none';
  document.querySelector('.app').style.display = 'flex';

  if (role === 'hyresgast') {
    cF = 'bjare6';
    renderSidebar();
    goto('hg-hem');
  } else if (role === 'forvaltare') {
    cF = 'bjare6';
    renderSidebar();
    goto('arenden');
  } else {
    cF = 'portfolio';
    renderSidebar();
    goto('portfolio');
  }
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  const ld = document.getElementById('login-loading');
  const btn = document.getElementById('login-btn');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
  if (ld) ld.style.display = 'none';
  if (btn) btn.disabled = false;
}

async function submitLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const ldEl = document.getElementById('login-loading');
  const btn = document.getElementById('login-btn');

  if (!email || !password) { showLoginError('Fyll i e-post och lösenord.'); return; }

  errEl.style.display = 'none';
  ldEl.style.display = 'block';
  btn.disabled = true;

  try {
    const res = await fetch(IDENTITY_URL + '/token', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: 'grant_type=password&username=' + encodeURIComponent(email) + '&password=' + encodeURIComponent(password)
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      showLoginError(err.error_description || 'Fel e-post eller lösenord.');
      return;
    }

    const data = await res.json();
    const token = data.access_token;

    // Get user info
    const userRes = await fetch(IDENTITY_URL + '/user', {
      headers: {'Authorization': 'Bearer ' + token}
    });
    const user = await userRes.json();
    loginSuccess(user, token);

  } catch(e) {
    showLoginError('Kunde inte ansluta. Kontrollera din internetanslutning.');
  }
}

function logout() {
  localStorage.removeItem('fp_token');
  localStorage.removeItem('fp_user');
  currentUser = null;
  authToken = null;
  document.querySelector('.app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-form-card').style.display = 'block';
  document.getElementById('set-password-card').style.display = 'none';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
}

// Check saved session on load
document.addEventListener('DOMContentLoaded', async function() {
  // Handle invite/recovery tokens from email links
  parseUrlTokens();

  const token = localStorage.getItem('fp_token');
  if (token) {
    try {
      const res = await fetch(IDENTITY_URL + '/user', {
        headers: {'Authorization': 'Bearer ' + token}
      });
      if (res.ok) {
        const user = await res.json();
        loginSuccess(user, token);
        return;
      }
    } catch(e) {}
    localStorage.removeItem('fp_token');
  }
});
</script>
